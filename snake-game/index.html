<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Game</h1>
        <div class="game-info">
            <div class="score-board">
                <p>Score: <span id="score">0</span></p>
                <p>High Score: <span id="highScore">0</span></p>
            </div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
        <div class="controls">
            <button id="startBtn" onclick="startGame()">Start Game</button>
            <button id="pauseBtn" onclick="togglePause()" disabled>Pause</button>
            <button id="resetBtn" onclick="resetGame()">Reset</button>
        </div>
        <div class="instructions">
            <h3>How to Play:</h3>
            <ul>
                <li>Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move the snake</li>
                <li>Eat the red food to grow and gain points</li>
                <li>Don't hit the walls or yourself!</li>
                <li>Press Start to begin, Pause to take a break</li>
            </ul>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
